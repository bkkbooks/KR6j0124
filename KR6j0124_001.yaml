body:
  text: 開府儀同三司特進試鴻臚卿肅國公食邑三千戶賜紫贈司空諡大鑒正號大廣智大興善寺三藏沙門不空奉詔譯序品第一如是我聞一時薄伽梵住菩提樹下與大菩薩衆所謂金剛幢菩薩摩訶薩觀自在菩薩摩訶薩得大勢至菩薩摩訶薩金剛手祕密主菩薩摩訶薩寂靜慧菩薩摩訶薩金剛慧菩薩摩訶薩堅固慧菩薩摩訶薩虛空無垢菩薩摩訶薩無垢慧菩薩摩訶薩普賢菩薩摩訶薩無盡慧菩薩摩訶薩虛空庫菩薩摩訶薩超三界菩薩摩訶薩持無能勝菩薩摩訶薩持世間菩薩摩訶薩天冠菩薩摩訶薩文殊師利童真菩薩摩訶薩月光童真菩薩摩訶薩不思議慧菩薩摩訶薩虛空藏菩薩摩訶薩除一切蓋障菩薩摩訶薩大進菩薩摩訶薩慈氏菩薩摩訶薩寶髻菩薩摩訶薩寶手菩薩摩訶薩妙臂菩薩摩訶薩如是等菩薩摩訶薩而為上首復與大苾芻衆所謂具壽舍利子具壽迦葉波具壽那提迦葉波具壽大迦葉波具壽伽耶迦葉波具壽目鍵連具壽大目鍵連具壽滿慈子具壽難陀具壽烏波難陀具壽賢善具壽阿泥樓馱具壽迦旃延子具壽俱郗羅具壽驕梵波提具壽大驕梵波提具壽孫陀羅具壽大孫陀羅具壽須菩提具壽耆宿驕陳如具壽制底象具壽羅睺羅如是等大阿羅漢而為上首復與無量諸天及諸天子所謂帝釋梵王大梵王夜摩天水天俱尾羅天善界天子他化自在天乃至光音淨居天衆如是等大威德天子而為上首復有無量阿蘇羅無量蘖路茶無量緊那羅無量羅剎娑無量比舍遮無量母天衆無量部多衆那羅延天伊舍那天與無量部多衆圍繞難提自在為上首大自在天為上首與無量瘧鬼衆圍繞拏枳儞毗紐天亦與無量瘧鬼衆圍繞於彼衆會天及天子阿蘇羅阿蘇羅子如是一切天龍藥叉乾闥婆阿蘇羅緊那羅摩睺羅伽羅剎衆等復有持明成就者所謂輪成就者劍成就者金剛杵成就者蓮華成就者鉞斧成就者如來部明成就者蓮華部明成就者金剛部明成就者盧陀羅天成就者毗紐天成就者母天衆成就者摩睺羅伽成就者蘖路荼成就者龍成就者拏枳儞成就者藥叉成就者摩尼跋捺羅成就者俱尾羅成就者水天成就者梵王成就者如是無量持明成就者為上首各與百千眷屬俱復有日月天子為上首與無量百千宿曜圍繞以為眷屬俱復有無量如來族蓮華族金剛族無量明王使者女使者衆金剛毗那夜迦盡無餘世間出世間衆一切山河池園苑街道四衢林神樹神江神城郭神村神尸林神鳥娑跢囉迦神惡夢神地底神宮殿神如是等上首乃至於此三千大千世界中天龍藥叉羅剎娑乾闥婆阿蘇羅蘖路荼緊那羅摩呼羅伽及諸母天瘧大瘧毗那夜迦餓鬼大餓鬼必舍遮藥叉羅剎娑等大威德者各與大威德眷屬俱皆於菩提場而住於五百由旬內大集會衆以佛威神加持互不相逼惱於是世尊住於如來莊嚴吉祥摩尼寶藏大寶樓閣告慈氏等上首菩薩言善男子此菩提場莊嚴樹我所坐處我於此坐已摧四魔證成無上佛智汝等咸應坐於是處一切智佛智皆得生出世尊説是語已默然而住爾時金剛手祕密主菩薩以佛威神及本願力從座而起偏袒右肩右膝著地合掌向佛世尊作禮白佛言世尊我問世尊如來應正等覺修佛頂真言異方便一切如來所説真言明教加行修習曼茶羅印契安布異成就事業一字轉輪王佛頂入於大三摩地印曼荼羅成就處軌則念誦印安布最勝事業祕密畫像法止魔息災增益調伏法如是一切如來部真實一切世間出世間明真言最勝不被他淩突無盡衆生界菩薩真言行成就由此一切有情獲得安樂由此佛頂輪王於贍部洲衆生修一切如來真言者作大佛事故由此世界贍部洲衆生獲一切安樂能堪任成就故一切天一切天族一切藥叉一切藥叉族一切緊那羅一切摩呼羅伽一切龍一切龍族一切天龍藥叉乾闥婆阿蘇羅蘖路荼緊那羅摩呼羅伽人一切世間出世間印真言作利益故成就故不令欺淩令安尊位故一切有情修佛頂真言者除一切苦惱令我真言族成就故觀自在等大菩薩真言行光顯故一切如來説印曼荼羅法要成就故無量如來所説真言印曼荼羅難成就者令易成故理趣法句法要唯願如來應正等覺説啓白是已爾時世尊誥金剛手祕密主言善哉善哉祕密主汝為一切衆生利益安樂輪王佛頂成就真言行精勤住持者一切如來所説真言汝能問如來如是事是故金剛手我為汝説先佛已説未來當説爾時釋迦牟尼如來以佛眼觀一切世界觀已為未來有情本願福力加持觀已告一切菩薩大衆言善男子汝等憶念一切如來所説輪王一字入一切法三摩地作不思議奇特神變於一切世界作大佛事一切三摩地中最勝句咸皆作意時一切菩薩咸皆憶念一切佛頂輪王大真言王及三摩地句唯除祕密主觀自在大菩薩由如來加持故時世尊坐大菩提樹下於大福生地如來入佛遊戲三摩地時一切如來悉皆同入是三摩地世尊彼時憶念攝受一切衆生界無量恆河沙數俱胝劫積集施戒忍進等波羅蜜無量難行苦行從大丈夫相出光明所謂後頂從白毫相從眉從眼從鼻從耳從唇從頭從袈裟從髆從手從臍輪從二乳從二乳間從項從二髀從二膝從二脛從二踝如是從坐處從二足如來法輪印處如是真多摩尼寶處如來鑠訖底三昧處錫杖印處從如是一切如來心印處從無能勝忿怒轉輪王入三摩地無能勝印處如是一切如來大慈處大悲處一切如來三摩地處如是從無畏處從記䇷處如是一切如來明真言處放光於一一光明無量光明以為眷屬從佛頂出無量百千光明種種色類青黃赤白紫色照無量佛剎照此三千大千世界一切地獄傍生悉除息塵翳息一切苦建立一切真言行於諸菩薩作一切義利成就大福莊嚴一切安樂易成就於剎那頃作一切義利成就已於恆河沙數佛世界魔宮殿咸令萎悴映蔽一切魔光乃至有頂下至無間大地獄邊際一切處照曜光曜驚覺一切有情復來旋繞世尊三匝已各各沒入本處菩提場所説一字頂輪王經示現真言大威德品第二爾時釋迦牟尼如來從三摩地起以佛眼觀一切佛剎彼一切天集會如師子奮迅而顧視誥金剛手祕密主言金剛手汝今諦聽一字佛頂大明王及四大佛頂及毫相等作大利益成就者明妃如來手如來鉢如來唇如來口法輪等大明王所有一切衆生界於一切有情勤修佛頂真言行菩薩等及一切有情菩薩乘受持者苾芻苾芻尼塢波塞迦塢波斯迦不被一切天世間沮壞獲得不退轉一切皆獲安樂一切處一切苦惱悉皆除滅一切皆悉起大慈行同一味相不被火燒不被水漂不被刀傷不被毒中不被蛇齧不被一切難一切如來所説大真言明王受持菩薩及餘淨信大乘菩薩乘有情從此一切如來三摩地出生大真言受持者及餘大明王受持者應以牛黃於樺皮上寫此陀羅尼安頭髻中若是苾芻苾芻尼寫此陀羅尼繫在袈裟中若塢波塞迦塢波斯迦繫在手臂或在頸下若國王帶不被他敵之所侵擾晝夜臥安覺安大威德賢聖諸天而常擁護如是及餘有情若能持此者勤修真言行者一切處獲得無礙一切人見悉皆歡喜遠離一切苦得一切安樂一切人天供養恭敬一切天龍乾闥婆阿蘇羅蘖路茶緊那羅摩呼羅伽餓鬼必舍遮一切難調障毗那夜迦不敢逼近離惡趣怖祕密主此大明王及明妃真言句一切有情勤修菩薩行者及修佛頂真言者以此作息災吉祥事惡星淩逼皆得息滅作一切衆生義利鉤召一切天龍藥叉祕密主我略説為修佛頂真言者速疾得悉地令作一切事業世尊説是已告金剛手此一切如來所説大真言王大佛頂白傘蓋佛頂高佛頂勝佛頂光聚佛頂如是大佛頂真言王入一切如來三摩地勤勇力等敵皆殊勝三摩地成就一字頂輪王佛眼毫相大慈大悲佛牙并無能勝如來手如來鉢如來袈裟如來法輪并明妃等説從大悲奮迅大人相師子吼流出一切菩薩不能摧壞一切佛加持共隨喜大慧照耀幽暗者令作光明以甚深智作無塵垢令作吉祥一切世間中最勝尊貴作最勝無塵無垢四無所畏令作端嚴慧令作廣大無量殊勝智令作堅固勇猛金剛鉤鎖身令作十力令作大威德令拂除愚暗令作一切佛智令作大護一切菩薩功德藏能令一切智智能令寂靜句令作無礙勇猛威德令作最勝慧難調衆生種性令生慈心能作一切如來熾盛三摩地大真言明王一字佛頂輪王而説真言曰曩莫三滿多沒馱南唵步嚕唵引釋迦牟尼佛世尊才説是真言譬如贍部洲大風吹一切樹林藂林藥草葉及花果悉皆振動如是才説是輪王一字真言三千大千世界六種振動須彌盧山亦皆大動大海騰沸及恆河沙數世界悉皆振動山谷及海猶如草葉一切山林河海皆悉振動一切魔宮如一熾盛火聚以佛威神加持力故悉皆恐怖魔衆諸天皆自不安歸依於佛世尊於一切世界中那洛迦趣有情悉皆獲得安樂爾時世尊作如是神力加持為令顯現輪王佛頂故自身作轉輪王形功德相莊嚴七寶成就一切光明熾盛晃曜照曜以無量法莊嚴間錯嚴飾大輪王師子座而坐熾盛照曜一切圓光如輪周匝形成一聚光無有一有情有情衆當彼之際而敢不瞬目瞻睹彼所有慈氏等大菩薩彼皆剎那頃亦不能不瞬目而瞻視爾時觀自在菩薩金剛手祕密主菩薩以佛威力悶絶躄地剎那謨呼律間則彼大威德摩醯首羅天帝釋天毗紐天夜摩天水天俱尾羅天風天蘖路茶緊那羅摩呼羅伽等一切器仗悉皆墮落摩醯首羅三戟叉墮落帝釋金剛杵墮落毗紐天輪俱尾羅棒水天羂索如是一切大威德天一切器仗墮落於地精氣威力神通皆奪由轉輪大真言明王加持故一切菩薩憶念菩提遊戲三摩地一切天龍藥叉乾闥婆阿蘇羅蘖路茶緊那羅摩呼羅伽等皆歸依佛世尊悉皆戰掉如芭蕉葉身毛竦竪不能堪忍觀大輪王真言色形爾時世尊隱大輪王色形剎那頃説此一切如來所説大明妃能息一切難調有情能成就一切佛頂輪王能息一切鬪諍言訟一切如來部真言母一切菩薩母觀自在菩薩金剛手祕密主為令起故説此佛眼一切佛所説能成就一切義利速疾成就輪王佛頂故説真言曰曩莫薩嚩怛他蘖底瓢一曷囉二合毗藥二合二三藐三沒第毗藥二合三唵引四嚕嚕塞普二合嚕五入嚩二合攞六底瑟姹二合七悉馱魯左儞八薩嚩囉他二合娑怛儞九娑嚩二合訶引十説是佛眼陀羅尼已觀自在菩薩金剛手祕密主等悉皆而起乃至所有一切天等衆會各各復得本神通各還執本器仗皆歸依佛世尊心大歡喜瞋視觀察如來各作是讚言嗚呼奇哉觀自在菩薩金剛手祕密主白釋迦牟尼應正等覺言世尊是何奇特世尊曾所未見如來持此頂輪王形光明聚是何希奇佛言善男子持頂輪王色形三摩地一切諸佛世尊佛遊戲神通善男子如於大曼茶羅集會汝等作真言身變化住不思議顯示大威德如是如是如來轉輪王真言色形身住而顯示善男子此佛頂轉輪王一切如來真言身住最勝三摩地一切諸大菩薩及一切真言明王明妃一切諸天無能違越善男子有此真言轉輪王佛頂若有人誦持處五百由旬內一切明世間出世間不流通不成就汝等所説清淨真言所加持真言不成就亦不往亦不現威德若才憶念此真言一切世間出世間真言悉地皆成就汝等所説加持真言身一切不可成就不現應驗者以此真言應成就之五百由旬內地方天龍藥叉乾闥婆阿蘇羅蘖路荼迦婁羅緊那羅摩呼羅伽菩薩住真言身者於處不堪忍住不遊行不成就不與現驗不與悉地何以故由住此佛頂輪王三摩地無能欺凌除佛眼真言三昧耶用此真言七遍誦之則其身寂靜若不然者其威德無能堪忍其修真言者必須初後誦此佛眼真言十地菩薩尚不能堪忍此輪王威德何況餘天王小類有情爾時世尊顯佛頂威德故欲現佛傘蓋威德故一切佛傘蓋加持故是時住白傘蓋佛頂王身如傘蓋形蓋此三千大千世界無一有情而作質礙白傘蓋形悉皆覆於佛頂其傘蓋頂當於如來頂中觀自在菩薩金剛手祕密主菩薩問佛世尊世尊此是何傘蓋色形蓋覆三千大千世界而住住於世尊頂上不見其邊際不可得以觀察瞻睹不可往其邊際佛言仁者此名白傘蓋佛頂王無量如來所共宣説一切如來無量色寶普遍音聲一切真多摩尼寶間錯寶珠網普遍現前不思議莊嚴而作影現是諸佛世尊傘蓋一切如來之傘蓋成佛頂王傘蓋作一切有情速疾成就是一切諸佛傘蓋名為白傘蓋大威德菩薩不得其邊際於千俱胝劫度量亦不得其邊際亦不能見邊際時世尊釋迦牟尼觀佛頂王以自神通威力加持住真言身形而説真言曰曩莫三滿多沒馱南唵怛他蘖覩瑟抳二合沙阿娜嚩路吉多母㗚馱二合唵摩摩摩摩吽匿儞戈反當彼之時此三千大千世界皆動搖震爾時世尊誥諸菩薩言諸菩薩此白傘蓋佛頂真言能成就一切真言能鉤台是大明王不空無礙勇猛爾時世尊顯揚佛頂王威德故作一切有情利益故能息除一切災禍逼迫能斷壞世間出世間真言以此真言句作加持無量菩薩稱讚無量俱胝佛説此佛頂王光聚令現大威德故是輪王佛頂之威光金剛句而説真言曰曩莫三滿多沒馱南一唵二怛他蘖覩瑟尼二合沙三阿娜嚩路枳帝四母㗚馱二合五帝儒囉始六吽七入嚩二合囉入嚩二合攞八馱迦馱迦九娜囉娜囉十尾娜囉尾娜囉十一瞋那瞋那十二頻那頻那十三吽吽泮吒泮吒十四娑嚩二合引訶引説此真言已三千大千世界如寶爓燈形無量間錯照曜與蓮花色帝青寶蘂為爓晃曜而現一切虛空際一切寶聚為寶帳間錯鈴鐸一切莊嚴光聚以變化力為門界道種種令普遍佛威德示現遍覆虛空界加持而住令一切菩薩作歡喜一切獲得安樂從佛頂出光明一切世間出世間真言明威皆斷壞令破奪其加持令不成就何以故大威光藏故爾時世尊誥金剛手祕密主言祕密主此一切如來光明照曜光聚佛頂由此光明照曜三千大千世界下至無間地獄邊際乃至有頂照曜一切魔宮悉皆萎悴於虛空際作照曜金剛手此佛頂王能斷一切真言才誦此真言修行者隨意世間出世間真言令斷令破令壞唯除輪王佛頂白傘蓋主佛頂高佛頂勝佛頂佛眼五字如來心除此餘一切世間出世間真言明斷壞令打令伏令縛令攝修行者若才稱名才誦隨意難調鬼魅令壞令打令馳走令挫辱金剛手此光聚佛頂不應非處誦持應於有舍利處誦持賢聖諸尊所攝受處何以故此威德光聚佛頂等同輪王威德故若不爾者即被傷損即聖衆不降臨諸魔得便當知於清淨處及有舍利處聖人得道處先以三昧耶加持復以輪王三昧耶佛眼加持若異此者即被傷損雖久修行亦不成就此光聚大真言王於修餘真言者不得輒誦何以故彼真言主威德損故當知於間靜處或於河側或於池邊或於海岸或於山間或於窟或於聖人作制底處其修行者獲大威德具力具大精進具念具慧等同餘部得悉地者威光威德猶如輪王真言成就祕密主此明王能生不思議威德祕密主此是如來威如來光如來加持一切諸佛之光明威德光明體光明性與一切有情威德能生威光性金剛手能斷一切真言能調難調者能壞他真言威此是大威德大神通能成辦一切事爾時世尊復觀無盡法界知已衆生利益故能令如來力三摩地等流一切菩薩無邊力勇猛故説一切佛所加持修一切真言與安樂故説真言曰曩謨三滿多沒馱南唵入嚩二合攞入嚩二合攞儞比也二合儞比庾二合那蘖二合都瑟尼二合沙度那度那吽引爾時一切世界悉皆震動一切天龍藥叉乾闥婆阿蘇羅蘖路茶緊那羅摩呼羅伽迷悶癡亂皆失神通難調者被燒毗那夜迦出呵呵聲爾時世尊誥祕密主言祕密主此名高佛頂王一切如來三摩地力勇猛大精進大力若有善男子善女人修習輪王佛頂者及餘淨信者所往處鬪戰論理諍訟一切處若誦所去處悉皆得勝或餘有大國王淨信佛法者用牛黃於樺皮上或素上書此真言繫旗纛上或於頸下則往他敵若見則便破敗他軍消融互不相救何以故以如來神力加持故或餘塢波塞迦塢波斯迦於頭上帶持彼人吉祥清淨威德吉慶威光威力不被他凌突獲得吉祥辨才祕密主我略説菩薩持此者獲得無量力勇健獲得如來加持一切魔無能沮壞一切諸天不敢逼近修此大真言者無有與等威力皆得成就若成就等同轉輪王真言何以故一切如來神力所加持三摩地力故是為高頂王爾時世尊釋迦牟尼如來現神通威德故一切罪息滅故一切惡趣摧壞故一切那洛迦苦息除故現不思議行神通故現一切如來神通威德積集故此佛頂真言王一切佛之所宣説真言曰曩謨三滿多沒馱南唵入嚩二合攞惹庾瑟尼二合沙入嚩二合攞入嚩二合攞滿馱娜麼滿馱娜麼弩嚕二合麼弩嚕二合麼弩嚕麼郝賀那吽引才説是真言此世界及一切佛剎六種震動無有一有情受飢渴苦以一切佛威神力現大威德故一切地獄中一切飢渴悉皆止息一切有情悉令獲得飲食恆河沙數等如來同共宣説為大怖畏有情作利益故示現大神通金剛手有此佛頂王所流布處一切魔不得其便何況修行者若有善男子善女人若能常憶念此真言王復能持誦彼獲得不思議神通成就具大精進神通圓滿一切諸天禮敬彼人不久獲不思議功德若有成就真言王者或有大乘淨信者或修習輪王佛頂者彼獲得不思議神通相應於一切有情中為最勝不應疑惑獲佛神通所求欲願獲得無礙一切神通平等真實無畏一切時等同諸佛金剛手若修勝佛頂真言者不久神通自在成就於剎那頃諸難調有情見者悉皆馳走所有魔衆諸天見彼皆失神通而悉馳走若有修習此真言成就者與轉輪王真言成就等無有異於地獄中亦作神通為處地獄有情作利益故如是一切有情息除飢苦我略説少分佛頂王三摩地神通熾盛無量無邊一劫不能説其福利功德我少分説世尊所説爾時世尊告一切菩薩衆善男子佛頂王等住一切如來三摩地真言身者千俱胝劫不能盡説其功德矜愍一切有情故而説少分是佛頂王族稱揚不思議功德千俱胝劫若如來説無能盡其邊際如來親自佛頂真言王輪王大威德若千佛於俱胝劫讚歎亦不能盡其邊際若有善男子善女人若以飲食衣服湯藥種種資具供養百佛若有人誦此輪王受持福聚無能與等即説伽陀曰若復智修行最勝真言王則成為菩提獲地位不疑為不生不滅持此佛頂者無有等威德不思儀色力三世無與等衆生身界異成就佛頂人無有等同者若帝釋自身或餘威德天一切世界中欲界大力者見修頂輪人若不起承迎頭破作七分猶如蘭香梢自在及帝釋水天俱尾羅藥叉大威德奪彼光萎悴千光而熾盛照曜於諸天若有大丈夫成就大真言王若讀若誦若受持乃至書寫經卷或書於樺皮帶持或塗壇或香泥塗地散花燒香末香以經卷置於壇中而作供養此法要受持讀誦為他演説觀其衆生根性勝劣而為宣説勤修菩薩行者殷勤而敷演畢獲得如來熾盛三摩地淨信究竟大乘堅固者應授與之如來言教可為敷演而為説之不應慳吝常得宿命智不墮於惡趣超千劫生死流轉證無上正等覺一切天龍常當擁護言音威肅令人樂聞一切有情愛樂憐愍安樂捨壽不為諸魔之所侵擾若有善男子善女人大有情堅固入大乘由滿願故修如來族真言是人具福大威德賢聖所攝受不歸依餘類唯歸趣佛菩薩超越一切魔道意趣諸根不缺者身色光潤黃白生於勝族清淨處生於吉宿大勤勇身相圓滿不太肥不太瘦亦不乾悴爪如赤銅踝骨平滿身形長大肌膚潔白不太團圝齒不疏黑眼目不睞亦不黃緑不疥癩不貪染不被毗那夜迦所持身相應頭圓平滿筋脈平正我今略説其相生於大族大福大威德有情説此法要是善男子善女人若得此佛頂真言必當成就為彼有情而敷演之而當敬禮慎勿不與必當與之若得此佛頂真言必當成就若有人得此堅固有情輪王佛頂必當成就此甚深法要餘世界中甚難得聞此由如來加持於餘多世界中得聞若有人一經於耳根應知皆是輪王三摩地之所加持應如是知若有人得此如來族法要修行者得至於手中皆是如來加持何以故皆是如來不思議真言三摩地頂輪真言身之所建立此一切真言中最大真言句頂王三摩地不思議法要應當知是故彼有情必當求如來真言成就若此法要書寫經卷或誦所在之處無量人天世間皆作供養獲得此三摩地熾盛法句彼人無增上嗔恚之心此經此卷國本有三處文義斷絶第七幅八九行云大福莊嚴一切安之下便云王身如傘蓋等第十三幅十九行云神通熾盛無量之下便云樂易成就等第二十幅八行云白傘佛頂之下便云無邊一劫不能説等今按丹本則國本錯將白傘蓋佛頂之下王身如傘蓋乃至神通熾盛無量等凡一百四十九行之文進而安于一切安之下却將一切安之下樂易成就乃至白傘蓋佛頂等凡一百五十行之文退而安于神通熾盛無量之下致使如是三節文斷今依丹本進退正之
