body:
  text: 開府儀同三司特進試鴻臚卿肅國公食邑三千戶賜紫贈司空諡大鑒正號大廣智大興善寺三藏沙門不空奉詔譯密印品之餘以右手握大指作拳加持五處名如來甲印一切佛頂中是印大威德若離於甲印行者不堅固如人而裸體亦如舍無人如國無帝王如林無青草如食無酥鹽如池無有水梵志無韋陀如火祭無蘇如車無御者如是修行者若闕甲胄印為諸魔得便悉皆不成就謹慎結甲胄諸魔不陵逼速疾得悉地真言曰曩謨三滿多沒馱南唵部引入入嚩二合攞吽修行者以此常加持自身譬如王在陳被甲而驍勇如是修行者被甲猶如王三時應護身能成一切事如前甲印舒中指則名如來頂髻大印能作一切事真言曰曩謨三滿多沒馱南阿俱嚕二合吒半音呼之準前頂髻印中指却合直竪頭指置於左右耳是如來耳印若常加於耳印真言相應彼人無耳病乃至一百劫真言曰曩謨三滿多沒馱南斛引迦半音呼之若有修行者具儀修輪王彼人獲天耳言音得最勝以左手如前甲印竪臂向身是如來牙大印安於自口傍牙處佛牙大威德印真言相應修行者成就真言曰唵怛他多能瑟吒𠼝三合吽泮娑嚩二合訶引準前甲胄印虛中指屈臂垂拳向下名為授記印成辦一切事由結此印故所有過去佛未來諸如來皆悉與授記是故修行者常結如是印獲得大威力於彼佛菩提常獲於授記彼常修行者當應不放逸結此授記印真言曰曩謨三滿多沒馱南唵吽引特鑁二合大威成就故惡人不沮壞具一切吉祥戒軌則精進具念大勤勇一切所生處堅禁具尸羅準前甲胄印微縮頭指在掌竪臂向上是如來膊印有大威力真言曰曩謨三滿多沒馱南畔惹阿呬泮吒娑嚩二合訶引即前印安於二乳間名如來嬭印真言曰曩謨三滿多沒馱南蓬補籠反誐枳禮二合朴右手以大指押中無名小指甲上直竪頭指引臂高竪是如來幢印真言曰曩謨三滿多沒馱南羯吒半音呼即以前幢印垂臂向下是如來臥印真言曰曩謨三滿多沒馱南阿俱嚕二合吒半音準前印以臂橫於胸是如來行印真言曰曩謨三滿多沒馱南吽引誐夢上唵以此印安於頭中是如來頭鉤印真言曰唵母囉馱二合曩儞娑嚩二合訶以右手大指捻無名小指甲上直竪中指頭指是如來脅印真言曰曩謨三滿多沒馱南唵吽却以右手大指押頭指小指甲上中指無名指直竪是如來眼印真言曰曩謨三滿多沒馱南唵鉢囉二合悉地羯𠼝娑嚩二合訶引即前眼印微屈中指無名指是如來光網印真言曰曩謨三滿多沒馱南唵入嚩二合里尼娑嚩二合引訶以右手大指押頭指甲餘三指竪微屈是如來光焰印真言曰曩謨三滿多沒馱南唵吽吽麼麼泮吒娑嚩二合引訶準前光爓印申中指令微屈小指無名準前是如來脣印真言曰曩謨三滿多沒馱南阿阿嚩嚩撼以右手大母指屈入掌中餘四指並展仰掌向前名為如來舌相印真言曰曩謨三滿多沒馱南唵曩囉尼畔惹吽泮吒娑嚩二合訶以左右二手仰掌以右手押左手上安臍下是如來三摩地印真言曰曩謨三滿多沒馱南唵阿底舍也尾羯囉二合彌娑嚩二合訶準前定印安於當心是一切如來過去未來現在金剛爓心印真言曰曩謨三滿多沒馱南吽入嚩二合攞嚩日囉二合緊吒鄰二合祖金剛手此名金剛爓一切如來三摩地明王無能違越一切天龍藥叉乾闥婆得地位菩薩亦無能違越何況餘有情大威德者以左手展覆於臍下展一右手仰押左手背名如來馬陰藏密印真言曰曩謨三滿多沒馱南唵努吒努吒娑普二合吒娑普二合吒尾捺羅三合跛儞鉢羅二合末娜儞親娜儞頻娜儞吽泮吒娑嚩二合訶引以右手作拳令甲不現唯出中指甲令現名如來坐處印真言曰曩謨三滿多沒馱南縊迦𠼝曩迦𠼝巘馱枳怛嚧二合娜囉麼尼覩尼娑嚩二合訶引準此前印露出頭指甲藏中指甲是名如來髀印真言曰曩謨三滿多沒馱南唵都他左娑嚩二合訶引準此前印藏頭指甲露出無名指甲是名佛慈三摩地印能生大慈心住慈定行者護持彼人故是故如來説此大真言王愍念諸有情師子賊怖等鬪諍逼迫中鬪戰於大怖應誦佛慈明真言曰曩謨三滿多沒馱南摩訶每底哩耶三合尾賀哩喃一沒馱每底𡄦二合引曩麼寫銘二三母怛波二合寧婆耶曩雞三迦攞奚尾囉二合奚制嚩四捨咄嚕二合難者波囉惹曳五也耶麼囉末藍二合婆喃六娑賽儞也二合麼囉嚩賀南七多娜含枳囉帶多二合以使也二合銘八尾淰薩嚩囉他二合娑地劍九也娜麼二合末藍二合薩嚩沒馱喃十囉曷二合單引者比也娜麼末藍二合十一薩達麼寫者諦逝曩十二薩鑁那勢銘播引波劍十三怛儞也二合他十四俱蒸擬儞十五俱蒸擬儞十六盎俱哩十七莽俱哩十八摩唎制波囉曩十九捨嚩哩二十囉乞灑二合囉乞灑二合𤚥二十一俱摩哩二十二室哩二合摩哩寧二十三娑嚩二合引訶二十四此是佛慈印是諸佛自體若能常憶念行者作善業一切難調者欲害作障難疾起於慈心由此明威力即用前印隱頭中名三指甲露出小指甲是如來無垢印真言曰曩謨三滿多沒馱南吽母引囉馱寧戶魯吽泮吒娑嚩二合訶引行者喫食時以此明加持先誦然後食身淨火力盛諸罪悉皆淨獲得而無礙於食時所有所起諸障難悉皆而遣除以佛無垢印準此前印隱其小指甲露出大指甲名為如來甘露印由結此印故能獲明解脫如來甘露真言曰曩謨三滿多沒馱南唵印擬寧部多寧娑嚩二合引訶以二手各以大拇指入掌緊握作拳以二拳相合名如來師子吼印種種奇特事意求而皆作由持頂輪王能成辦一切真言曰曩謨三滿多沒馱南唵劫比羅惹置羅吽泮吒娑嚩二合引訶引以二手虛心合掌十指右押左互相交名為吉祥印名娑嚩二合娑底二合迦如來吉祥印能成大人相真言曰曩謨三滿多沒馱南慈稍上聲重呼即以此前印悉開於十指小指大指合餘指皆微屈是印如蓮華名為蓮華印如來吉慶印獲福德義利獲王福及餘地居有情福成得大吉祥行者不應疑真言曰曩謨三滿多沒馱南唵蘇末𡀔二合憾彌二合攞乞瑟銘三合娑嚩二合引訶引成就福不虛獲大王福德準前印如未敷蓮華應結於當心名般若波羅蜜印此明大威德是一切佛母常説諸佛道過現及未來一切諸佛母是印大威力真言曰曩謨三滿多沒馱南唵輸嚕底娑蜜哩二合底尾惹曳娑嚩二合訶金剛手此般若波羅蜜明過去未來現在一切佛菩薩辟支聲聞一切悉皆修般若波羅蜜得成佛世尊皆從般若波羅蜜生皆修習般若波羅蜜悉皆證得大菩提準此前印雙屈大指入掌是如來大悲印真言曰曩謨三滿多沒馱南唵怛㘄二合擬寧娑嚩二合引訶引即以前印各屈大指入掌各令柱著小指根下是名如來膝印真言曰曩謨三滿多沒馱南唵娜部二合引擬寧鉢囉二合捻跛跢二合娑嚩二合訶引準前膝印以二大指各柱無名指根是名如來踝印真言曰曩謨三滿多沒馱南阿怛嚟二合怛嚟二合嗢怛嚟二合嚩日囉二合母乞史二合尼娑嚩二合訶引準前踝印以二大指跓中指根下名如來足印真言曰曩謨三滿多沒馱南唵嚩日囉二合商俱攞部史帝娜囉入嚩二合攞吽娑嚩二合訶引爾時世尊告金剛手祕密主言金剛手此等大印一切如來從身分流出大丈夫相莊嚴善男子是印等一切如來所説一一印百千俱胝印以為眷屬皆從如來支分生於後末法劣慧小有情不能盡知其福利説伽他曰若成此明王為彼利益故我今而略説汝當應受持令得廣流布是印名大印有大威神力令末法有情修持善品故若善男女等常能結此印加持於自身成就大真言輪王佛頂等彼獲無量福而得百千種一切罪皆滅一切佛菩薩憐愍皆愛念常得宿命智諸根皆圓具心亦不誤失一切諸佛等悉皆而攝受壽命得長遠遠離諸疾病令作衆生明拔濟諸惡趣聰慧具精進威德常勤勇當生於勝族具諸巧技藝能療諸疾病我今而略説一切佛加持即成大丈夫若常持大印常當於自身稱名而受持遠離諸障難諸罪皆消滅諸佛頂皆成證得如來身金剛手此一切如來族真實大印結印相法利益佛頂部有情我今釋迦牟尼宣説菩提場所説一字頂輪王經諸成就法品第九爾時釋迦牟尼佛觀察大衆為未來世有情誥金剛手祕密主言祕密主當來後世懶墮懈怠不精進於善法無餘暇有情貪愛染著不能於廣大願而求成就愍念利益彼有情故或婆羅門生於勝族或剎利族姓者有清信及發菩提心者愛樂修真言行者利益如是等有情我為略説真言明王佛頂轉輪王功德能摧一切天龍藥叉阿蘇羅調伏有情亦能令死令枯令驅擯令憎惡令禁止令壞令摧一切佛菩薩之所稱讚大威德神力令作無比等三摩地修行令超越一切魔道示現天中天佛色形像於無量劫不能説此大教王無量百俱胝劫不能盡其功德邊際我今少分而説金剛手聽善聽極善聽極善作意爾時如來説伽他曰我説異方便一切佛所説利益諸有情於百多無量是諸如來所亦作如是説若有人才誦此真言王離一切怖畏若能常持誦一切諸魔悉皆遠離一切罪一切惡作皆得消滅如上所説畫像隨於一像前三時澡浴三時換衣三時以儀軌相應誦二十五落叉遍遍數終後從白月一日起首日誦一千八遍乃至月圓滿取蘇摩那花結以為帳以檀香塗三肘曼荼羅以種種塗香華燒香飲食用酥以為燈然一千八盞當毗舍佉白分月圓滿日結金剛跏念誦乃至現四種相所謂雲雷聲道場中幡華動佛像出光明佛像動搖見如是相於中所成就物則得成就若誦俱胝遍則成先行誦二俱胝遍成大先行誦三俱胝遍能成辦一切事誦四俱胝遍一切龍藥叉乾闥婆阿蘇羅路荼緊那羅摩呼囉伽等皆得攝伏成大悉地於恆河側或於海岸作如來一搩量窣堵波於一一窣堵波前以香華而供養誦七俱胝遍則末後塔放光放光已其光入行者身隱沒即於剎那頃於一切世界無有一有情藥叉等與彼等者帝釋尚速來梵天與眷屬及樂變化天及餘化自在淨居究竟天并大威德者剎那而集來於彼成就人所有諸天龍化彼令調伏彼天剎那頃悉雨種種華乃至無間獄悉皆得清涼爾時修行者剎那頃如來制底放光後自身成大威德成大神通於天中威德光明如融金色顏貌二八童子相一切如來之所攝授得大智慧隨意身通如意迅疾如風身光映奪諸餘天衆若有見彼成就者或成就者見彼人悉皆共彼騰空作大持明仙王以無量百千持明為眷屬遊歷無量世界以身光照曜一切成就者才思惟一切悉皆成辦所至帝釋處帝釋分與半座無有與彼等顏貌勇健智慧威德無有等同者以此因緣獲得菩薩善巧方便調伏有情獲得善巧住於無量大劫見無量佛出現於世於中佛出現彼大不思議人天皆供養獲得身精進智慧亦復然神通救有情等同佛輪王修持勝真言諸貪悉除滅獲得人中尊祕密主此修行方便有如來名寶火曾為人身時及寶幢如來光明自在王如來如是等無量如來皆得成就觀自在菩薩不動步超越菩薩曼殊室利菩薩如是等無量大菩薩為人身時獲得成就求大菩提者祕密主如汝為人身時曾修此佛眼大明以難行苦行以大精進獲得成就愍念世間故金剛幢如來出興於世正法末時大怖畏時如是此真言王於無上菩提堅固決定者得成就我今又説餘成就事業隨取一像前誦十洛叉遍念誦終時於滿月一日一夜不食以白芥子置於水中誦一千八遍散灑十方則成結曼荼羅界於像前種種食飲廣大供養於荷葉上置牛黃或雄黃結跏趺坐護身加持藥念誦乃至三相成就若暖相現一切衆生皆得調伏歸敬煙相現安怛那成就若光相現取身上塗身如初日暉年二八相髮拳旋如螺紺青色無量持明仙圍繞即成大持明仙住壽一大劫神通月白分三時澡洗三時換衣依儀軌三時發露懺悔隨喜勸請發願回向時別誦一千八遍乃至月圓滿夜一日一夜不食則取苾芻毗奈耶所説應量修造鉢袈裟錫杖隨取一事一千三波多護摩於像前廣大種種供養取所成就物置於壇中護其物念誦乃至出光若是袈裟及僧伽梨衣即披鉢及錫杖即手持便即飛騰虛空成持明仙遊往餘佛剎土能作大變化住壽一大劫又以如來搩量造窣堵波十萬取一劍無瑕翳者隨取一像前於神通月白分於八日或十四日作三波多護摩加持劍於像前廣大供養坐於茅薦其劍以右手而持念誦乃至空中出聲作是言成就矣然後其像放光其光照曜行者然後鼓明即阿蘇羅女來圍繞修行者以為眷屬即飛騰虛空成大持明王仙能現種種形狀往來自在能觀餘世界無礙住壽大劫又於高山頂上安佛像喫根莖果誦二十一萬遍然後以補沙鐵為輪或鉢置娑應使諸根圓具匠造造已則往於阿蘇羅宮於宮門安置佛像并助伴對像前之時燒佉陀羅木以然火坐茅薦上以右手持輪芥子油和木槵葉護摩十萬遍一切阿蘇羅關鍵破壞又誦十萬遍護摩即阿蘇羅宮中火然熾盛第三誦十萬遍一切阿蘇羅女出窟外祈求修行者勤勇丈夫使我等何為入此宮中受用微妙欲樂并諸助伴同入餘不入三昧耶壇者莫令入忽然輒入彼此損害而死是故彼人不知三昧耶入於宮中求成就劍成就輪或餘成就物彼得是物為大阿蘇羅持明仙王所有阿蘇羅宮中成就物為主其持明仙無量阿蘇羅女以為眷屬遊歷此世界成大阿蘇羅身管屬一切阿蘇羅得大阿蘇羅王禮敬彼能化大阿蘇羅種種身住壽一大劫所隨入者皆壽一劫其成就人才憶念誦輪王真言其那羅延輪破壞欲得其輪如故隨意得成於迦葉波佛等覺教法時名持輪明王得輪成就持輪而出以此因緣名持輪明王令現在於世間深生淨信為佛優婆塞迦爾時世尊説伽他曰又説餘成就先佛之所説我於往昔時曾作於商估勤苦大精進作微妙成就我今而宣説我名為路摩成就中為王我昔本生時為諸苾芻説愍念有情故又如前軌儀於大河岸側或於大海邊作一千八窣堵波如來一搩量大對此塔前於一一塔前以香華供養誦真言十萬三千遍當作塔之時吉相而得現補沙鐵作輪令端嚴匠造緣利無瑕穢六輻短搩量置於五淨中三波多護摩神通月白分善伴戒行者應修如劍法乃至出光爓吉祥持明者即成諸嚴具大身遊自在威德具神通善伴大丈夫遊歷諸世界大力住一劫作衆生導師又説大成就法應作先行法於大河側或海岸置佛像對前誦俱胝遍然後作十萬六千窣堵波則入成就復説伽他曰不擇日及宿亦不限齋戒取不壞攝嚩成就迷怛囉淨洗而嚴飾華冠及衣服依儀求悉地彼攝嚩即起無怖依儀軌善伴極作意應問善不善長年伏水銀貴位隱形法一切諸方便所問皆指示念誦極功夫輪王大力明則為奉教使能與諸悉地奉教既成已獲得諸悉地常在於左右大力而遊行或於彼口中當置細鐵末則便吐其舌漸長如青蓮以利刀而割修行者殷勤則成劍持明身色初日暉則往須彌峯并伴大力者天衆悉皆怖驚懼心忙然圍繞作眷屬帝釋與半座如來威德耳六十千俱胝而為作眷屬於彼衆為主彼皆大驍勇大威大熾盛大眷屬奇特如是等之類威德諸天子行處常圍繞威力如大王則往於千剎以大神通力則動千彌盧及動俱胝山并千贍部洲及動百天宮一切令動搖以光悉照曜於諸地獄中以大神通力施與諸飲食獲得微妙智威德如天王嚴身具吉祥天女皆圍繞微妙身大威身色如青蓮剎那悉遊歷無量諸世界當住一千劫常供養諸佛劫火不能燒并諸大眷屬則往餘世界如是等種種以功德莊嚴彼則成菩薩救濟諸有情又持誦之人倍加而念誦應作窣堵波十萬有六千準如來肘量於攝嚩口中應置細寶末無間而念誦當即於舌上現真多摩尼熾盛大威德殷勤作加護則取奇特寶由得此寶故則成寶持明自在為大王執劍持明仙常衛護彼人又於口中置乳糜應和酥欲起而吐出行者不雜亂受取置瓦器或銀熟銅器共伴而加持與伴而食之則成大威德住壽一大劫則成持明仙或手安於口行者而念誦從口出香篆行者應作拳如前求成就若得暖相現以拳擬諸人有情及無情悉皆得愛敬以拳不應擬或應是口中若得見於火是彼修行者名為拳持明次説大成就則往蓮華池應作先行法佛像幀於壁行者不亂心為大福故修心懷常捨施蓮華搵酪蜜及與搵蘇等護摩五落叉是像眼手動當知得成就即作為邑主遠離一切事護摩十萬遍則為大福人護二十一萬為諸地囉惹説正法度人常樂而捨施倍加而持誦輪王大威德成辦一切業決定勿生疑我今而略説輪王成就法古往已成就一切諸佛子聖曼殊室利得大勢菩薩虛空庫菩薩我亦持此明得離生死怖得遇於善友獲得諸成就此中作是説佛頂勝真言當來成就者所有三界中無有與彼等過色相威力如佛於世間成就頂真言無有得過者先説成就法如來勝經中所有諸印契授與於世尊為成真言王是印無與等大力大威德所説成就法希有大奇特所有十自在十力子所説若與此相應能壞於帝釋何況餘有情為彼難調伏而作種種法如是等種類如來況成就以此教王儀修習求悉地不成者令成何況求成就以此教王中攝入一切法諸佛法眼中説為最殊勝爾時世尊釋迦牟尼如來復觀一切大衆以伽他句誥金剛手言先佛諸仙寶髻説於是契經盡警覺娜囉彌拏攝嚩羅凍誐摩蹬伽之明少分盡彼境界教此非正教三昧耶我為染衣而宣説於彼愚昧及多聞慳吝嗔恚種種類於諸真言諸教法邪見不平諸有情世間出世之人故多分於此世間者聰哲匱財之人類末法作障求覺道是故相應三昧耶加行修習求成就尚於夢中無愛染先知真言三昧耶曼茶羅法等差別然後真言律儀中身口意因而相應設説祕密真言教仍假瑜伽觀行成應是佛頂常修習真言教法成就中真言諸礦地中財所有諸地之方所諸餘所有占算論王法理論及書畫醫方工巧如是等一切皆是世尊説調伏有情而示現諸佛此中作是説悉地三種而分別本來清淨真言法獲得儀軌與印契誰於一切起憎嫉真言句義悉皆無憎嫉感招諸障難著於文字心猶豫彼作真言多分別著於真言緣枝葉不應與彼惡律儀於旃陀羅不應説彼等之人不成就受與惡人惡律儀法則不成壞己身是故於彼慎莫説纏染貪欲必不成彼常匆遽不得成於事匆速無審慮云何成就救有情住阿蘭若及山藪五塵交雜必不成當住淨念心流散彼等行者必不成是故心應而制伏三種謗毀如來説求法他世之有情住法之人理相應心作三種謗毀者世間悉無作是説自性而去亦不去自性若成真言王一切悉皆何不成是故世間有二論精進共同由福因是故不應而誹謗世間有無作是思聖天種種設軌則住世愍念有情故無知性劣過所染我説獲得下悉地一切諸天應供養不應致禮我先説是故不應而毀謗亦不應起於譏嫌無量劫中不能説真言最勝無比行我説三部儀次第所説教中多種類應作次第而修行真言教心輪王法菩提場所説一字頂輪王經世成就品第十爾時釋迦牟尼如來入一切真言教照曜入不思議佛境界力遊戲三摩地由入是三摩地恆河沙數佛世界諸佛菩薩亦入是三摩地爾時金剛手見釋迦牟尼如來應等正覺入是三摩地繞佛七匝於佛前持金剛杵不瞬目觀佛世尊爾時世尊從三摩地而起及彼一切佛亦從定出爾時釋迦牟尼佛從定起已誥金剛手祕密主言汝祕密主汝聽此大教一切如來之所宣説五佛頂王普通而説能作大奇特微妙略説不廣并真言若有成就修行者彼人次第如教而得成就世尊作是説金剛手先應一切佛頂王普通真言句殊勝三摩地説真言身我説奉請真言曰曩謨薄誐嚩覩瑟尼二合沙也一翳醯呬薄誐挽二達磨囉惹鉢囉二合三底掣麼麼囉伽二合四巘馱五補澀波二合六度波七末鱗左𤚥者毗八囉乞灑二合引九鉢囉二合底賀多十麼羅波囉二合訖囉二合麼也十一娑嚩二合引訶引此是普通迎請真言於閼伽中應置白花而迎請次香等真言曰曩謨薄誐嚩覩瑟尼二合沙也一伊𤚥二巘淡三蒲澀二合甘補甘反四度甘準上五末臨六儞半者七鉢囉二合底車八賀囉賀囉九薩嚩沒馱十地瑟恥二合諦十一達麼囉引惹十二鉢囉二合底賀多也十三娑嚩二合訶引迎請火天真言曰曩謨婆誐嚩引覩瑟尼二合沙也翳醯呬帝儒摩里寧引銀曩二合曳娑嚩二合引訶引若發遣火天加也呬也呬句辦事真言曰曩謨薄誐嚩覩瑟尼二合沙也唵吒嚕二合滿馱娑嚩二合引訶引此真言作一切事業時應用護身是大真言作大義利亦名一切佛頂心真言摧壞真言曰曩謨薄誐嚩覩瑟尼二合沙也唵微枳囉拏度曩度曩度此名摧壞大明王佛頂真言為除一切毗那也迦若被侵惱時以此真言加持水灌頂亦用護身結方隅界一切事業處應用摧毀佛頂真言曰曩謨薄誐嚩覩瑟尼二合沙也薩嚩尾近曩二合尾特網二合娑曩迦囉也吒嚕二合吒也娑嚩二合引訶引以此真言難調惡人能作治罰兼護助伴守方隅者以如是等大真言於輪王曼茶羅修真言行大威德者作一切事業修行者先應作是思惟我今淨此念誦室白芥子和護摩灰以摧碎佛頂加持一百八遍或以辦事佛頂應加持念誦室散灰及芥子即成淨室即以此真言於淨瓶中盛水加持一百八遍散灑四方或以自真言心或以隨心加持即成攝授處所以摧壞佛頂真言加持四枚佉陀羅木橛一百八遍於淨室中四方釘之即成結曼茶羅界無能勝佛頂真言曩謨薄誐嚩覩瑟尼二合沙也薩嚩怛囉二合波囉引爾多也唵奢麼也奢麼也扇引諦難引諦達麼囉惹婆史諦摩訶尾儞也二合薩嚩囉他二合娑馱寧娑嚩二合訶引以賢瓶盛香水加持一百八遍持誦者用自灌頂離一切毗那也迦障此是無能勝佛頂大真言能息諸障礙常作於息災能除諸惡夢我今説一切頂王普通功德修行法少分而説若才憶念成自身護持誦三遍結頂髻以灰或白芥子加持七遍置於頭上成大加護加持縷二十一遍結二十一結繫於臂上一切災禍寒熱病等悉皆消滅若住奢麼那誦一百八遍於一切怖畏處得加護隨意應作貿易摩訶莽娑又以酥護摩一切處一切災悉得消滅取伏藏時以酥護摩一百八遍離一切障難能護助伴或取白芥子護摩一百八遍一切諸障悉皆息除定知有伏藏處以乳護摩一百八遍恣意取用無有障難又於阿蘇羅窟門誦三十萬遍一切關鍵悉皆破壞或芥子和嚕地囉鹽粖誦一千八遍護摩二十一日日三時窟中一切宮殿悉熾然火燒阿蘇羅女被燒出窟門請行者入窟授與囉娑藥長年藥諸成就等物或結輪王佛頂印擲於彼前即彼倒地又喫穬麥飲乳誦三十萬遍得長年藥又月蝕時勿觀月加持乳一百八遍成大長年藥又於山頂乞食誦三十萬遍遍數滿已三日三夜不食燒油麻酪蘇蜜相和然阿濕嚩二合他木以為護摩從晨朝起首乃至晝夜作護摩則得囉惹又於山頂作緣生法身塔或作舍利塔於舍利塔前取百千蓮華每一華誦一遍一獻塔則得摩訶滿孥里主若不成就得大邑主或鄉黨主又法取蓮華塗白檀香入大河水至臍每誦一遍加持蓮華獻獻已擲於水中乃至百千數獲得大伏藏若捨施無有盡竭又欲得敬愛成就者白芥子和油麻油三時護摩滿一七日則得囉惹及次小王皆得敬愛又欲令婆羅門敬愛取白華護摩赤華剎利黃花毗舍黑花輸陀羅以鹽寡婦人以麼沙婆羅門小豆或油麻一切童女取羯囉尾囉未敷花七日日三時護摩一切人得敬愛又粳和尾沙和苦練葉作護摩成驅逐設咄嚕又以芥子護摩摧設咄嚕又以尸林灰護摩令殞又以芥子油護摩一切部多鬼敬愛又以鬱金護摩一切必舍支敬愛又結印誦真言加泮字能除鬼魅又以覩羅斯葉燒鬼魅現下語又真言中加弱字令中毒者迷悶却得穌又真言句中加匿儞翼反字毒不行又真言句中加莫字制毒蛇又尸麼舍那炭畫作圓壇召毒蛇及鬼魅來能禁止又真言句中加摩字能禁口又真言句中加息字禁惡星又真言句中加吒字摧利牙者加速字令損支分加底瑟姹二合底瑟姹二合縛鬼魅加羯吒羯吒即被縛加𠸪乞沙二合路乞沙二合即令護持加滿馱滿馱或加𡃝馱𡃝馱禁喉又日蝕時或月蝕時孔雀尾對於像前供養誦真言加持孔雀尾念誦乃至日月復此孔雀尾以手把揮曜能現種種幻化被毒中者令蘇能成辦種種事業又鹽和油麻護摩令設咄嚕患鬼魅及虐又以瞿摩夷揑彼人形以刀斷其支彼即隨所斷處便損又燒一切種柴一切花一切果一切種樹膠令所求種種財寶皆得又燒油麻護摩所求財寶皆得又燒屈屢草護摩令得增壽又護摩粳米則得兒又燒蜜一切人皆得敬愛又護摩酥得威德又護摩乳得息災又護摩酪得增益又七日三時和酥護摩一切物獲大悉地我説大成就法如前先行法於山頂有舍利塔前誦三十萬遍然後對像前以稻穀花和酪酥蜜護摩一千遍則成先行法此先行法通一切求成就用又入於大林不食誦百千遍遍數滿已則結其頭髻即隱形解其髻即現又上於山頂面向日常食乳穬麥誦十萬遍滿已則得隱形又法以左手作拳誦十萬遍末後則得安怛但那又當日蝕時取劫波羅以摩努沙髮作算搵摩劣沙脂燒以薰劫波羅中刮取黑粖加持一百八遍取點眼得安怛但那又取摩努沙心和牛黃作丸以三金裹或黑月分或白分加持念誦藥有聲置於口中安怛但那又取牛黃加持塗身得持明成就亦得最上成就又日月蝕時取黃牛酥置於熟銅器中以熟銅筯攪念誦取三相現若沸眼得聞持不忘煙得安怛但那爓飛騰虛空如是雄黃黃丹成就餘物等皆現三種相成就又蘇路丹惹那一千三波多護摩或於黑白分求成就若煙安怛但那又劍輪像杖黑鹿皮一切成就物皆三波多護摩依教畫像前或無像或有舍利塔前離無益談話處於河山寂靜處應修三種成就於一切成就中得為最勝成就又取不壞攝嚩先與澡浴嚴飾以佉羅橛釘繫於白黑二月隨取一分應用黑月吉日并有助伴善作護身坐彼胸上迷怛羅口中瀉乳糜不間斷念誦即其迷怛羅欲起即吐以熟銅器承取便食自身得成就又取金粖置迷怛囉口中即吐出嚴具即得持明仙若以鐵粖置彼口中即吐出劍若置白芥子彼口中即吐出嚴具若置油麻彼口中吐出本真言教經夾皆得持明成就飛騰虛空又以手按彼迷怛羅口念誦加持乃至三相現動即諸意所求事皆説授與長年藥若起即成使者其持明者欲所去處乘彼肩上隨意而往得持明仙爾時世尊復告金剛手菩薩祕密主言祕密主汝聽不廣而略説普通修一切佛頂等成就資少獲大利諸佛之所説此中作是言羯儞迦囉花及取蓮華蘂蘇嚕丹惹那三金而裹之應作此丸藥當於日月蝕得三種成就暖煙焰次第暖必獲敬愛煙當而隱形爓相成騰空吉祥大持明如雷振作聲幡華而動搖應知成就相及佛像動搖若見不吉祥不應求成就獻塗香花等數數應當作息災護摩法乃至於七返然後作勝法應作窣覩波福加求成就蜴蜥及烏鳴應觀成不成然後求成就念誦以為先并歸命獲果作福為有情真言必成就為少福愚夫多分為是人為此增加福成佛悲為本利益諸世間故説真言教天王帝釋等及餘大威德才誦於彼勝及居在王宮由信獲應驗成就者當獲端嚴而常作清淨修行者不應強多事由此心雜亂如世間之人劣慧無方便於諸合練道闕緣不和合諸藥及水銀由倒壞不成三種微細故施功不獲益若取於伏藏必有王怖畏占相必生疑微細生猶豫醫術果增長攝授長年藥由持真言故悉皆而獲得長年等果報如是諸技術過患有無量以此無所獲不獲最勝福彼亦不獲福猶此心住著真言以為首必獲大福德菩提最勝果聞思及修行獲得最勝果是處諸賢聖恆常而往來是故與瑜伽成就本所尊仍於最勝集我以曾廣説見今所説者亦廣亦復略
