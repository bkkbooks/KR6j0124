body:
  text: 開府儀同三司特進試鴻臚卿肅國公食邑三千戶賜紫贈司空諡大鑒正號大廣智大興善寺三藏沙門不空奉詔譯無能勝加持品第十一爾時世尊觀金剛手祕密主復以伽他而誥之曰當於未來世有情劣精進我慢嗔恚癡無慚矯慳吝不能依儀軌修習真言行是持誦之人護摩所加持諸魔悉惑亂悉無是思惟以明獲成就虛受諸勤勞常作是思惟愚夫常是說為息彼障故亦除諸魔羅今說此大明先佛之所說利益諸有情是無能勝明若人常憶念隨時住等引彼諸魔障者悉皆得除滅即說真言句爾時金剛手祕密藥叉主心生大歡喜頂禮於世尊大覺智莊嚴此大無能勝是明我願聽爾時世尊即說大無能勝陀羅尼曰曩謨囉怛曩二合怛囉二合夜引也曩謨薩嚩沒馱冒地薩怛吠二合毗藥二合怛儞也二合他去引爾寧爾寧爾曩嚩黎怛也去曩嚩黎怛也去蘗多娑賀惹低薩嚩沒馱𩕳曬尾諦阿目岐岐曳切八阿鉢囉二合底丁以反賀低阿波羅爾諦尾囉而尾誐多婆去曳尾摩黎儞捺囉二合娑囉二合吠婆嚩底曳二合迦彌𠼝娜以諦奴囉地誐謎薩丁也二合𩕳囉俱𠼝摩囉嚩攞尾那設寧舍枳也二合母寧悉諦二合惹娑嚩隸曩尾哩曳二合拏𠸪乞灑二合𠸪乞灑麼麼薩跛哩嚩覽去聲薩嚩多薩嚩迦覽囉惹主嚕娜迦虞哩也二合設寧尾窟僧賀弭也二合仡羅二合娑哩薩哩二合跛禰嚩彥達縛曩誐藥乞灑二合囉剎娑弭底哩二合比舍左步多阿鉢娑麼二合囉布單曩羯吒布單曩迦區去㗚那二合塢娑多二合囉迦謎怛羅訖哩二合丁也二合羯麼拏滿怛囉二合庾誐祖㗚拏二合庾誐拏枳儞庾二合烏祖賀囉薩嚩婆也訥瑟跓二合鉢捺囉二合冒鉢薩俁波也細瓢曩謨窣覩二合諦婆誐嚩底烏捺囉鼻爾拏儞哩儞哩囉怛那二合俱攞娑摩失哩二合諦弭里弭里阿迦捨馱覩虞左㘑企里企里薩嚩怛他蘖多哩也二合室囉二合迦楞迦羅步諦泥尾捻奴揖反尾也二合哩也二合沒囉二合憾麼二合怛他多努諦尾濕嚩二合進底也二合嚩囉波囉波囉訖囉二合謎曩謨婆誐嚩底波囉爾諦𠸪乞灑二合𠸪乞灑二合麼麼薩嚩訥瑟跓二合鉢捺囉二合吠無肺反波也細毗藥二合娑嚩二合引訶引說是陀羅尼世間悉皆聞是大無能勝能壞一切魔能增勤勇力則住三昧形名為無能勝說彼大心明大力極勇猛不異於前明是心世尊說真言曰曩謨颯跢喃三藐三沒馱俱致南薩失囉二合嚩迦僧伽喃薩嚩謎囉婆也底跢喃尾波尸曩薩諦二合惹娑㗚𠆙左始企曩薩怛二合也尾濕嚩二合步入鉢囉二合枳娘二合也制鑁訖㘁二合俱孫那嚩隸曩左羯諾迦牟尼始乞灑二合也迦捨跛寫俁拏囉比舍枳也二合僧賀寫弭里曳二合拏塞嚩二合娑底婆嚩覩摩摩薩嚩薩怛嚩二合難者薩嚩婆庾鉢捺囉二合吠同上毗藥二合怛儞也二合他惹曳尾惹曳惹演底尾惹演底阿爾單惹曳若演底阿爾諦阿波囉二合爾諦摩囉枳娘二合鉢羅末娜寧曳娑嚩二合引訶說此心真言應等正覺說七佛之世尊顯揚諸功德即說是大明利益修行者普遍諸世界六種而振動一切魔宮殿悉皆大振動金剛手此真言句一切諸佛所說利益衆生故祕密主或持誦輪王真言者或持餘真言者以此真言加持結縷或結袈裟角或結頂髮或樺皮上書帶頸臂彼人速疾易得成就本尊速現其前念誦時若能憶持金剛手我不見天世魔世沙門婆羅門衆中若此真言加護若穢者若淨者前若人若非人或魔子或必舍遮或毗那也迦或藥叉或鳩槃茶或羅剎娑或餘類有情欲來障難作是思惟於阿吒迦嚩底丁以反王宮不得入若有違越此明清淨修行者彼悉皆違逆金剛種族及自種族并親族朋友不容住於彼金剛手此明真言有大威力於一切事業應作加護應供正遍知印可一切諸菩薩印可菩提場所說一字頂輪王經證學法品第十二爾時世尊知無盡法界已除遣一切諸障復誥金剛手菩薩言金剛手若善男子善女人苾芻苾芻尼若欲修習佛頂不思議印三摩地彼苾芻住苾芻律儀殷勤而護持苾芻尼住苾芻尼律儀塢波塞迦住塢婆塞迦律儀塢波斯迦住塢波斯迦律儀若是彼善男子修真言行者彼先應入曼茶羅授三歸依發菩提心應成就十善業道如說修真言行極善作意親近承事善友常修六念應觀法界如虛空自性應善修習入般若波羅蜜境界於此觀行不欺誑不放逸善應隨三世佛菩薩行行住於阿蘭若不顧戀一切身命三時善應授三歸菩提心律儀戒所聞甚深佛法憶持修行善修四攝於如來窣覩波前常塗曼荼羅於真言儀軌常精進作窣覩波身口專精修行不怒不躁不掉舉口不多語不雜亂語不欺誑他於諸有情常行恭敬愛樂心善知如來密意之說我略說修行者常懷勇猛大精進意安立一切有情於佛菩薩道若修佛頂王真言行者若修餘真言行者應如所說功德善應修行成就如方廣經典所說真言行應當修習各住自律儀善應護持復誥金剛手如說修佛頂真言行者已得成就身如初出日輪真金瓔珞臂釧作閻浮檀金色一切嚴具莊嚴其身著天妙衣具諸相好縱廣周停身相奇特百千光明莊嚴圓光一尋超過日輪映奪一切色身復次金剛手成就持明仙才見令一切衆生喜悅猶如如意樹令滿一切所求復次金剛手成就輪王佛頂菩薩至於地獄雨種種天妙飲食亦能滿一切衆生所須有所希望者皆得滿足我略說彼有大威德金剛手成就輪王真言者皆滿一切有情意樂由心起念則令滿足彼得輪王成就之人住十地菩薩不敢違越其教令金剛手此一字輪王真言一切真言中為王大明王主若修行滅除一切業障亦滅除一切惡趣之業得成此真言一切神通悉皆現前才瞬目頃往於色究竟天一切佛菩薩緣覺聲聞稱讚歡喜得一切菩薩行於餘世界自在遊行於一切有情隨其意趣種種音聲而為說法乃至我略說於無量無邊世界有情希奇行色最勝廣大獲得成就爾時如來說伽他曰種種鬪戰空自在如栽寶性而照曜若青蓮華在池開彼勝驍勇威光色彼人悉皆超世明毗鈕真言不可及爾時世尊復誥金剛手祕密主復說伽他曰略說普通法祕密地居人明者先行後指示相最勝地方說三種卑濕及乾燥并以於高原於明天所居名曰為勝地中方說三種求成就之地皆通於三種智者應觀察淨不淨兩并天妙復三種於此一一中各分為三種河池海山王稱最勝成就淨不淨德俱名中成就處若是尸林地是名不淨處此教一切處成就處三種惡王賊飢儉是處不應居行者有障難彼地不應住極寒熱雨處於此教悉制三時應念誦長養意樂故應攝三種時菩提場所說一字頂輪王經護摩品第十三復告金剛手遠離於祕密成就不可得於此經教中成就故說密護摩爐差別應祕密而作息災等三種一處不應作若一處護摩護摩爐必謬若於調伏爐不應作息災如器中有毒盛乳必當壞審觀三種事故說三種爐餘教亦說三爐作是分別於此應用之是故不相違明屈屢草芽許用於牛酥優曇鉢天木及以於乳木并用鬱金香三時作護摩為求息災故獲得種種利若被竊藥物應用黑油麻和蜜常用之及波羅奢木及與天木等應用白芥子護摩而稱讚於諸三種法而用酥護摩爾時世尊釋迦牟尼復告金剛手祕密主言於此中修行教王為有情利益故復說伽他曰說是真言明種種大威德修習佛頂王種種真言明無量大奇特并佛眼等明成就諸義利及與印契等我先已宣說普通真言王為求成就者獲得果報故我今說印契為求悉地故一類說多種次第我今說普通佛頂印以二手內相叉作拳竪二中指相合屈上節普通一切佛頂印能成就一切義利由見此印契如親覩諸佛難調諸藥叉龍阿酥羅衆一切諸羅剎由此印威德悉融而驚怖此是大真言一切佛頂心曩謨三滿多沒馱南唵吒嚕二合滿馱四娑嚩二合引訶復說伽他曰若得此印契能獲諸安樂國王等世間於彼常利益欲求法利益決定而獲得若得此印契諸苦悉消滅由此一切佛頂根本印作一切事業修行者護諸根者以此根本印用中指端來往即名迎請印一切普通先所說以各自真言用結此根本印通一切處用塗香花燒香飲食燈明等以此印用之即用前印二中指峯如環狀是迎火天印真言如先已說若發遣火天時以印向外掣即成發遣火天印又即此印准前辦事佛頂印以右中指頭屈上節跓蹙左中指面上節是摧壞頂印能作奇特事能作一切事護身結界處應當而受用又移左中指屈上節蹙跓右中指面上節是摧毀頂印真言如先已說此名摧毀頂能調難調者在於大障難以此應護身准前普通印屈右中指第三節拄左中指第一節文能淨處所故用此摧毀頂若求成就時結此護處所移左指如前以此印護處是諸佛頂心應用摧毀頂用以自灌頂以此印常用若人得此印能淨念誦室常於澡洗時修行者應用彼人無諸障誦是真言故次第而用之本部三昧耶常用如此印修習真言者彼人無諸魔於此佛頂教佛作如是說即前印二中指於手背上相押如環此無能勝頂能滅一切罪真言已先說能除諸惡夢能成吉祥事應用此大印當欲寢臥時自身若常誦能滅種種障我今而略說廣說有無量於此我略說為修佛頂者共佛眼真言而誦求悉地一切諸會中我皆已先說修諸真言說解脫一切如來及菩薩得諸安樂獲義利增加精進及大力有情利益勤修習悉除一切諸疑惑是故金剛祕密主諦聽我為汝宣說我已略說義相應此是祕密修明者三時護摩以天木油麻及酥乳相和以此歡喜真言王當說成就真言主成就念誦及護摩三種相資而演說於此一一修行中念誦修行說三種身口及意次第說以此希望增益事復說三種應當知天上遊空及地居為彼求成有三種為修三種之種類成就求欲及求財并與求法而念誦隨其悉地發勤勇為求一切成就故善應依法作制底正見大悲求成就彼人成就亦不難現世獲得勝安樂他世必獲於解脫古昔多人得成就由修頂王大奇特我曾修此佛頂王爾時世尊釋迦牟尼如來以佛眼觀無量無邊世界復告金剛手言說伽他曰諸教中已說律儀與軌則能作及所作於此教法中應當而修行以彼聖甘露軍茶利明王通修於三部我說儀軌法常當而修行由彼真言威一切障悉除明王經所說忿怒王印契彼中諸儀軌悉皆此中用不應食葱蒜羅蔔及𮏄子不以油塗身亦不應食油所有不淨食餘教中所制一切不應食求悉地行者常求淨身故以無能勝明應用於五淨半月半月用所餘諸教說悉皆而修行於此我略說說餘經教中於此不廣說一切諸如來說真言法性諸佛及菩薩曾修亦曾說住彼真言形遊行於世間廣作諸義利為彼劣慧者盡說其威德我今少分說稱讚其功德而於百劫中不能說輪王奇特之法性此功德無盡無盡無所得若得此教王彼人同如來亦同於菩薩天蘇囉禮敬心得不退轉常恆獲如是先世所積集菩提之資糧皆由祕密主大威神之力當知彼有情常得清淨身若得此教王悉皆得一切證成兩足尊佛說是經已金剛手祕密主諸大菩薩等苾芻及一切世間天龍藥叉乾闥婆等聞佛所說歡喜奉行
