  - {type: variant, offset: 7066, length: 186, content: 此經此卷，國本有三處文義斷絕。第七幅八九行云「大福莊嚴一切安之下便云王身如傘蓋等」，第十三幅十九行云「神通熾盛無量之下便云樂易成就等」，第二十幅八行云「白傘佛頂之下便云無邊一劫不能說等」。今按丹本，則國本錯將「白傘蓋佛頂之下王身如傘蓋乃至神通熾盛無量等」凡一百四十九行之文，進而安于「一切安」之下，却將「一切安」之下「樂易成就乃至白傘蓋佛頂等」凡一百五十行之文退而安于「神通熾盛無量」之下，致使如是三節文斷。今依丹本進退正之, 宋: '', 元: '', 明: '', 甲: '', 乙: ''}
